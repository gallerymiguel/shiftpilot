services:
  shiftpilot-api:
    build:
      context: ../server
    container_name: shiftpilot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      shiftpilot-db:
        condition: service_healthy

  shiftpilot-db:
    image: postgres:16
    container_name: shiftpilot-db
    restart: always
    environment:
      POSTGRES_USER: shiftpilot
      POSTGRES_PASSWORD: shiftpilot
      POSTGRES_DB: shiftpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftpilot -d shiftpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: